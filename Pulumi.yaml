name: ctfer
runtime: go
description: "High-Availability and Secure CTF deployment tool over Kubernetes."
config:
  # region root-level
  namespace:
    type: string
    description: "The namespace where ctfer stack will be installed."
    default: "ctfer"
  images-repository:
    type: string
    description: "Custom registry to use for Docker images."
    default: ""
  charts-repository:
    type: string
    description: "Custom registry to use for Helm charts (oci://)."
    default: ""
  chall-manager-url:
    type: string
    description: "Chall-Manager API URL to use."
    default: ""
  ingress-namespace:
    type: string
    description: "The namespace where the ingress-controller is installed."
    default: "default"

  # region platform
  platform.image:
    type: string
    description: "CTFd image to use."
    default: "ctferio/ctfd:latest"
  platform.hostname:
    type: string
    description: "The URL to use for CTFd."
    default: "localhost"
  platform.crt:
    type: string
    description: "X509 .crt content for HTTPS."
    default: ""
  platform.key:
    type: string
    description: "x509 .key content for HTTPS."
    default: ""
  platform.workers:
    type: integer
    description: "Number of worker inside container."
    default: 1
  platform.replicas:
    type: integer
    description: "Number of replicas of the StatefulSet."
    default: 1
  platform.requests.cpu:
    type: string
    description: "The number of CPUs to use."
    default: "2.0"
  platform.requests.memory:
    type: string
    description : "The memory size to use."
    default: "1Gi"
  platform.limits.cpu:
    type: string
    description: "The maximum number of CPUs to use."
    default: "4.0"
  platform.limits.memory:
    type: string
    description: "The maximum memory size to use."
    default: "2Gi"
  platform.storage-size:
    type: string
    description: "Size of the PVC."
    default: "2Gi"
  platform.storage-class-name:
    type: string
    description: "The StorageClassName for the PersistenVolumeClaim."
    default: ""
  platform.pvc-access-modes:
    type: array
    description: "The AccessMode for the PersistenVolumeClaim."
    items:
      type: string
    default:
      - "ReadWriteOnce"

  # region db
  db.storage-class-name:
    type: string
    description: "The StorageClassName for the PersistenVolumeClaim."
    default: ""
  db.operator-namespace:
    type: string
    description: "The DB operator namespace."
    default: ""

  # region otel
  otel.endpoint:
    type: string
    description: "The OpenTelemetry Collector endpoint to set signals to."
    default: ""
  otel.insecure:
    type: boolean
    description: "If set to true, send signals to the OpenTelemetry Collector in plain text."
    default: false

author: CTFer.io
license: Apache-2.0
website: https://ctfer.io
